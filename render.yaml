services:
  - type: web
    name: campus-library-mcp
    runtime: python
    plan: free
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn server:app --host 0.0.0.0 --port 10000
    envVars:
      - key: PYTHON_VERSION
        value: 3.11.0
    rootDir: mcp-servers/mcp-library
    healthCheckPath: /health

